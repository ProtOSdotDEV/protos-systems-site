<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin // ProtOS Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
    <link href="/assets/css/nav.css" rel="stylesheet">
    <link href="/assets/css/pride.css" rel="stylesheet">
    <style>
        .wrap { max-width: 560px; }
    </style>
</head>
<body>
<div class="pride-banner">
    <div class="pride-stripes">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span>
    </div>
    <div class="pride-content">
        <span class="pride-comment">/*</span>
        <span class="pride-flag">🏳️‍🌈</span>
        <span class="pride-keyword">Happy Pride Month</span>
        <span class="pride-comment">//</span>
        <span class="pride-call"><span class="pride-fn">ProtOS.support(</span><span class="pride-string">"LGBTQIA+"</span><span class="pride-fn">)</span></span>
        <span class="pride-comment"> */</span>
    </div>
</div>
<nav class="navbar">
    <a class="site-title" href="/">ProtOS Systems</a>
    <div class="nav-links">
        <a class="tab" href="/">Overview</a>
        <a class="tab" href="/en/Projects/">Projects</a>
        <a class="tab active" href="/en/dev-log/">Developer Logs</a>
        <a class="tab" href="/en/contact/">Contact</a>
    </div>
</nav>

<div class="wrap">
    <p class="eyebrow">// restricted</p>
    <h1>Admin</h1>

    <!-- ADMIN VIEW (access is gated by Cloudflare Zero Trust on /admin/*) -->
    <div id="admin-view">
        <div class="form-status" id="post-status" style="margin-top: 1.5rem;"></div>

        <form id="log-form" style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 1.5rem;">
            <div class="field">
                <label for="project">Project</label>
                <input type="text" id="project" placeholder="e.g. ProtOS" required>
            </div>
            <div class="field">
                <label for="date">Date</label>
                <input type="date" id="date" required>
            </div>
            <div class="field">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="Short headline" required>
            </div>
            <div class="field">
                <label for="body">Body</label>
                <textarea id="body" placeholder="What happened?" required></textarea>
            </div>
            <button class="submit-btn" id="post-btn">
                <span class="spinner"></span>
                <span class="btn-label">Publish Log</span>
            </button>
        </form>
    </div>
</div>

<footer class="footer">
    <div class="footer-bottom">
        &copy; <span id="year"></span> ProtOS Systems. All rights reserved.
    </div>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

// Publishing goes through a same-origin endpoint behind Zero Trust.
// The GitHub write token lives there as a server secret, never in this
// public page. See admin/api/publish (Cloudflare Pages Function).
const PUBLISH_ENDPOINT = '/admin/api/publish';

const logForm    = document.getElementById('log-form');
const postBtn    = document.getElementById('post-btn');
const postStatus = document.getElementById('post-status');

document.getElementById('date').valueAsDate = new Date();

function setStatus(el, msg, type) {
    el.className = 'form-status' + (type ? ' ' + type : '');
    el.textContent = msg;
}

function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.classList.toggle('loading', loading);
}

logForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading(postBtn, true);
    setStatus(postStatus, '', '');

    const entry = {
        project: document.getElementById('project').value.trim(),
        date: document.getElementById('date').value,
        title: document.getElementById('title').value.trim(),
        body: document.getElementById('body').value.trim(),
    };

    try {
        const res = await fetch(PUBLISH_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entry),
        });

        if (!res.ok) throw new Error('Failed to publish log entry.');

        setStatus(postStatus, 'Published. The site will rebuild in about a minute.', 'success');
        logForm.reset();
        document.getElementById('date').valueAsDate = new Date();
    } catch (err) {
        setStatus(postStatus, err.message || 'Something went wrong.', 'error');
    } finally {
        setLoading(postBtn, false);
    }
});
</script>
</body>
</html>
