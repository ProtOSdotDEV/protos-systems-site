<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin // ProtOS Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="/assets/css/styles.css" rel="stylesheet">
    <link href="/assets/css/nav.css" rel="stylesheet">
    <link href="/assets/css/pride.css" rel="stylesheet">
    <link href="/assets/css/admintab.css" rel="stylesheet">
</head>
<body>
<div class="pride-banner">
    <div class="pride-stripes">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span>
    </div>
    <div class="pride-content">
        <span class="pride-comment">/*</span>
        <span class="pride-flag">🏳️‍🌈</span>
        <span class="pride-keyword">Happy Pride Month</span>
        <span class="pride-comment">//</span>
        <span class="pride-call"><span class="pride-fn">ProtOS.support(</span><span class="pride-string">"LGBTQIA+"</span><span class="pride-fn">)</span></span>
        <span class="pride-comment"> */</span>
    </div>
</div>
<nav class="navbar">
    <a class="site-title" href="/">ProtOS Systems</a>
    <div class="nav-links">
        <a class="tab" href="/">Overview</a>
        <a class="tab" href="/en/Projects/">Projects</a>
        <a class="tab active" href="/en/dev-log/">Developer Logs</a>
        <a class="tab" href="/en/contact/">Contact</a>
    </div>
</nav>

<div class="wrap">
    <p class="eyebrow">// restricted</p>
    <h1>Admin</h1>

    <!-- ADMIN VIEW (access is gated by Cloudflare Zero Trust on /admin/*) -->
    <div id="admin-view">

        <!-- Tab bar: the two "buttons". Add more tabs here later. -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="devlogs">// developer logs</button>
            <button class="admin-tab" data-tab="projects">// projects</button>
        </div>

        <!-- ============ DEVELOPER LOGS TAB ============ -->
        <section id="tab-devlogs" class="admin-pane">
            <div class="form-status" id="log-status"></div>

            <form id="log-form" class="stack">
                <div class="field">
                    <label for="log-project">Project</label>
                    <input type="text" id="log-project" list="project-options" placeholder="Pick or type a project" required>
                    <datalist id="project-options"></datalist>
                </div>
                <div class="field">
                    <label for="log-date">Date</label>
                    <input type="date" id="log-date" required>
                </div>
                <div class="field">
                    <label for="log-title">Title</label>
                    <input type="text" id="log-title" placeholder="Short headline" required>
                </div>
                <div class="field">
                    <label for="log-body">Body</label>
                    <textarea id="log-body" placeholder="What happened?" required></textarea>
                </div>
                <button class="submit-btn" id="log-btn" type="submit">
                    <span class="spinner"></span>
                    <span class="btn-label">Publish Log</span>
                </button>
            </form>

            <h2 class="proj-form-heading" style="margin-top: 2.5rem;">Recent logs</h2>
            <div id="recent-logs" class="project-items"></div>
        </section>

        <!-- ============ PROJECTS TAB ============ -->
        <section id="tab-projects" class="admin-pane" hidden>

            <!-- project list -->
            <div id="projects-list" class="project-items"></div>

            <!-- add / edit project -->
            <div class="form-status" id="project-status"></div>
            <h2 class="proj-form-heading" id="project-form-heading">Add a project</h2>
            <form id="project-form" class="stack">
                <input type="hidden" id="project-original-name" value="">
                <div class="field">
                    <label for="p-name">Name</label>
                    <input type="text" id="p-name" placeholder="e.g. ProtOS" required>
                </div>
                <div class="field">
                    <label for="p-status">Status</label>
                    <select id="p-status">
                        <option>In Progress</option>
                        <option>Planned</option>
                        <option>Complete</option>
                        <option>On Hold</option>
                        <option>Archived</option>
                    </select>
                </div>
                <div class="field">
                    <label for="p-description">Description</label>
                    <textarea id="p-description" placeholder="What is this project?"></textarea>
                </div>
                <div class="field">
                    <label for="p-tags">Tags <span style="color:var(--text-dim)">(comma-separated)</span></label>
                    <input type="text" id="p-tags" placeholder="OS, Linux, ARM64">
                </div>
                <div class="field">
                    <label for="p-link">Link <span style="color:var(--text-dim)">(optional)</span></label>
                    <input type="url" id="p-link" placeholder="https://...">
                </div>
                <div style="display:flex; gap:0.75rem; align-items:center;">
                    <button class="submit-btn" id="project-btn" type="submit">
                        <span class="spinner"></span>
                        <span class="btn-label">Save Project</span>
                    </button>
                    <button type="button" class="back-link" id="project-cancel" hidden>cancel edit</button>
                </div>
            </form>
        </section>

        <!-- ============ SINGLE PROJECT + ITS LOGS (drill-down) ============ -->
        <section id="tab-project-logs" class="admin-pane" hidden>
            <button type="button" class="back-link" id="project-logs-back">&larr; back to projects</button>
            <h2 class="proj-form-heading" style="margin-top:1rem;" id="project-logs-heading"></h2>

            <div class="form-status" id="plog-status"></div>
            <form id="project-log-form" class="stack">
                <input type="hidden" id="plog-project" value="">
                <div class="field">
                    <label for="plog-date">Date</label>
                    <input type="date" id="plog-date" required>
                </div>
                <div class="field">
                    <label for="plog-title">Title</label>
                    <input type="text" id="plog-title" placeholder="Short headline" required>
                </div>
                <div class="field">
                    <label for="plog-body">Body</label>
                    <textarea id="plog-body" placeholder="What happened?" required></textarea>
                </div>
                <button class="submit-btn" id="plog-btn" type="submit">
                    <span class="spinner"></span>
                    <span class="btn-label">Add Log to Project</span>
                </button>
            </form>

            <h2 class="proj-form-heading" style="margin-top:2.5rem;">Logs for this project</h2>
            <div id="project-logs-list" class="project-items"></div>
        </section>

    </div>
</div>

<footer class="footer">
    <div class="footer-bottom">
        &copy; <span id="year"></span> ProtOS Systems. All rights reserved.
    </div>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

/* --------------------------------------------------------------------------
   Endpoints. Reads hit the public static JSON. Writes go to a same-origin
   endpoint behind Zero Trust (a Cloudflare Worker that holds the GitHub
   write token as a secret). Until that Worker is deployed, reads/listing
   work but saving will report an error — that's expected.
   -------------------------------------------------------------------------- */
const DEVLOGS_URL      = '/data/dev-logs.json';
const PROJECTS_URL     = '/data/projects.json';
const DEVLOG_ENDPOINT  = '/admin/api/dev-log';   // POST {project,date,title,body}
const PROJECT_ENDPOINT = '/admin/api/project';   // POST {action:'save'|'delete', project, originalName}

const state = { logs: [], projects: [] };

/* ---------- small helpers ---------- */
function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function setStatus(el, msg, type) {
    el.className = 'form-status' + (type ? ' ' + type : '');
    el.textContent = msg;
}
function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.classList.toggle('loading', loading);
}
function fmtDate(d) {
    try { return new Date(d + 'T00:00:00').toLocaleDateString(undefined,
        { year:'numeric', month:'short', day:'numeric' }); }
    catch { return d; }
}
async function postJSON(url, payload) {
    const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('Save failed — is the publish Worker deployed?');
    return res;
}

/* ---------- data loading (cache-busted so updates show after rebuild) ---------- */
async function loadData() {
    const bust = '?t=' + Date.now();
    const [logsRes, projRes] = await Promise.allSettled([
        fetch(DEVLOGS_URL + bust).then(r => r.json()),
        fetch(PROJECTS_URL + bust).then(r => r.json()),
    ]);
    state.logs     = logsRes.status === 'fulfilled' ? (logsRes.value.logs || []) : [];
    state.projects = projRes.status === 'fulfilled' ? (projRes.value.projects || []) : [];
    renderAll();
}

function renderAll() {
    renderProjectOptions();
    renderRecentLogs();
    renderProjectsList();
}

/* ---------- developer logs tab ---------- */
function renderProjectOptions() {
    $('project-options').innerHTML =
        state.projects.map(p => `<option value="${escapeHtml(p.name)}">`).join('');
}
function logCardHtml(log) {
    return `
        <div class="project-item">
            <div class="proj-info">
                <div class="proj-name">${escapeHtml(log.title)}</div>
                <div class="proj-desc">
                    <span style="color:var(--green-dim)">${escapeHtml(log.project)}</span>
                    &middot; ${escapeHtml(fmtDate(log.date))}
                </div>
                <div class="proj-desc" style="margin-top:0.4rem;">${escapeHtml(log.body)}</div>
            </div>
        </div>`;
}
function renderRecentLogs() {
    const el = $('recent-logs');
    const logs = state.logs.slice().sort((a, b) => (b.date || '').localeCompare(a.date || '')).slice(0, 10);
    el.innerHTML = logs.length
        ? logs.map(logCardHtml).join('')
        : '<p class="msg-empty">No logs yet.</p>';
}

/* ---------- projects tab ---------- */
function renderProjectsList() {
    const el = $('projects-list');
    if (!state.projects.length) {
        el.innerHTML = '<p class="msg-empty">No projects yet.</p>';
        return;
    }
    el.innerHTML = state.projects.map(p => {
        const count = state.logs.filter(l => l.project === p.name).length;
        return `
        <div class="project-item">
            <div class="proj-info">
                <div class="proj-name">${escapeHtml(p.name)}
                    <span class="pill" style="margin-left:0.5rem;">${escapeHtml(p.status || 'Planned')}</span>
                </div>
                <div class="proj-desc">${escapeHtml(p.description || '')}</div>
                <div class="proj-desc" style="margin-top:0.3rem;color:var(--green-dim)">${count} log${count === 1 ? '' : 's'}</div>
            </div>
            <div class="proj-actions">
                <button class="sm-btn" data-act="logs" data-name="${escapeHtml(p.name)}">logs</button>
                <button class="sm-btn" data-act="edit" data-name="${escapeHtml(p.name)}">edit</button>
                <button class="sm-btn del" data-act="delete" data-name="${escapeHtml(p.name)}">del</button>
            </div>
        </div>`;
    }).join('');
}

function fillProjectForm(p) {
    $('project-original-name').value = p ? p.name : '';
    $('p-name').value        = p ? p.name : '';
    $('p-status').value      = p ? (p.status || 'In Progress') : 'In Progress';
    $('p-description').value = p ? (p.description || '') : '';
    $('p-tags').value        = p ? (p.tags || []).join(', ') : '';
    $('p-link').value        = p ? (p.link || '') : '';
    const editing = !!p;
    $('project-form-heading').textContent = editing ? `Edit "${p.name}"` : 'Add a project';
    $('project-cancel').hidden = !editing;
    if (editing) $('project-form').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

/* ---------- single-project drill-down ---------- */
function openProjectLogs(name) {
    $('plog-project').value = name;
    $('project-logs-heading').textContent = `Logs · ${name}`;
    $('plog-date').valueAsDate = new Date();
    const logs = state.logs.filter(l => l.project === name)
        .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    $('project-logs-list').innerHTML = logs.length
        ? logs.map(logCardHtml).join('')
        : '<p class="msg-empty">No logs for this project yet.</p>';
    showView('project-logs');
}

/* ---------- view switching ---------- */
function showView(name) {
    document.querySelectorAll('.admin-pane').forEach(p => { p.hidden = true; });
    $('tab-' + name).hidden = false;
    // tab bar only reflects the two top-level tabs
    document.querySelectorAll('.admin-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.tab === name));
}

document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => showView(tab.dataset.tab));
});

/* projects list actions (event delegation) */
$('projects-list').addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    const name = btn.dataset.name;
    const p = state.projects.find(x => x.name === name);
    if (btn.dataset.act === 'edit')  fillProjectForm(p);
    if (btn.dataset.act === 'logs')  openProjectLogs(name);
    if (btn.dataset.act === 'delete') {
        if (!confirm(`Delete project "${name}"? Its dev logs are kept.`)) return;
        try {
            await postJSON(PROJECT_ENDPOINT, { action: 'delete', originalName: name });
            setStatus($('project-status'), `Deleted "${name}". Site rebuilds in ~1 min.`, 'success');
            setTimeout(loadData, 1500);
        } catch (err) { setStatus($('project-status'), err.message, 'error'); }
    }
});

$('project-logs-back').addEventListener('click', () => showView('projects'));
$('project-cancel').addEventListener('click', () => fillProjectForm(null));

/* ---------- form submits ---------- */
$('log-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading($('log-btn'), true);
    setStatus($('log-status'), '', '');
    const entry = {
        project: $('log-project').value.trim(),
        date:    $('log-date').value,
        title:   $('log-title').value.trim(),
        body:    $('log-body').value.trim(),
    };
    try {
        await postJSON(DEVLOG_ENDPOINT, entry);
        setStatus($('log-status'), 'Published. Site rebuilds in ~1 min.', 'success');
        $('log-form').reset();
        $('log-date').valueAsDate = new Date();
        setTimeout(loadData, 1500);
    } catch (err) {
        setStatus($('log-status'), err.message, 'error');
    } finally {
        setLoading($('log-btn'), false);
    }
});

$('project-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading($('project-btn'), true);
    setStatus($('project-status'), '', '');
    const project = {
        name:        $('p-name').value.trim(),
        status:      $('p-status').value,
        description: $('p-description').value.trim(),
        tags:        $('p-tags').value.split(',').map(t => t.trim()).filter(Boolean),
        link:        $('p-link').value.trim(),
    };
    const originalName = $('project-original-name').value || project.name;
    try {
        await postJSON(PROJECT_ENDPOINT, { action: 'save', project, originalName });
        setStatus($('project-status'),
            `Saved "${project.name}". Site rebuilds in ~1 min.`, 'success');
        fillProjectForm(null);
        setTimeout(loadData, 1500);
    } catch (err) {
        setStatus($('project-status'), err.message, 'error');
    } finally {
        setLoading($('project-btn'), false);
    }
});

$('project-log-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    setLoading($('plog-btn'), true);
    setStatus($('plog-status'), '', '');
    const entry = {
        project: $('plog-project').value,
        date:    $('plog-date').value,
        title:   $('plog-title').value.trim(),
        body:    $('plog-body').value.trim(),
    };
    try {
        await postJSON(DEVLOG_ENDPOINT, entry);
        setStatus($('plog-status'), 'Added. Site rebuilds in ~1 min.', 'success');
        $('plog-title').value = '';
        $('plog-body').value = '';
        setTimeout(() => { loadData().then(() => openProjectLogs(entry.project)); }, 1500);
    } catch (err) {
        setStatus($('plog-status'), err.message, 'error');
    } finally {
        setLoading($('plog-btn'), false);
    }
});

/* ---------- init ---------- */
$('log-date').valueAsDate = new Date();
loadData();
</script>
</body>
</html>
