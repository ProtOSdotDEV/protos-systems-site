<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Building low-level systems, deliberately."/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtOS Systems</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/nav.css">
    <link rel="stylesheet" href="/assets/css/pride.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="preconnect">
</head>
<body>
<div class="pride-banner">
  <div class="pride-stripes">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span>
  </div>
  <div class="pride-content">
    <span class="pride-comment">/*</span>
    <span class="pride-flag">🏳️‍🌈</span>
    <span class="pride-keyword">Happy Pride Month</span>
    <span class="pride-comment">//</span>
    <span class="pride-call"><span class="pride-fn">ProtOS.support(</span><span class="pride-string">"LGBTQIA+"</span><span class="pride-fn">)</span></span>
    <span class="pride-comment"> */</span>
  </div>
</div>
<nav class="navbar">
  <a class="site-title" href="/">ProtOS Systems</a>
  <div class="nav-links">
    <a class="tab" href="/en/home">Overview</a>
    <a class="tab" href="/en/projects">Projects</a>
    <a class="tab" href="/en/dev-log/">Developer Logs</a>
    <a class="tab" href="/en/contact">Contact</a>
    <a class="tab active" href="/en/contrib">Contributors</a>
  </div>
</nav>

<div class="wrap">
  <p class="eyebrow">// Our Wonderful contributors <3</p>
  <h1>Contributors</h1>
  <p class="page-lead" style="margin-bottom: 3rem;">
    text goes here
  </p>

  <div class="grid" id="contrib-grid">
    <p class="empty">Loading peoplez :3</p>
  </div>
</div>

<footer class="footer">
  <div class="footer-bottom">
    &copy; <span id="year"></span> ProtOS Systems. All rights reserved.
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const gridEl = document.getElementById('project-grid');

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  fetch('/data/projects.json')
          .then(res => {
            if (!res.ok) throw new Error('Failed to load projects');
            return res.json();
          })
          .then(data => {
            const contribs = data.contribs || [];

            if (contribs.length === 0) {
              gridEl.innerHTML = '<p class="empty">No Contributors listed yet.</p>';
            }

            gridEl.innerHTML = contribs.map( p => {
              const tags = (p.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
              const inner = `
                    <span class="pill">${escapeHtml(p.status || 'Planned')}</span>
                    <h3 style="margin-top: 0.75rem;">${escapeHtml(p.name)}</h3>
                    <p>${escapeHtml(p.description || '')}</p>
                    <div class="tag-list">${tags}</div>
                `;
                return p.link
                  ? `<a class="contrib-card" href="${escapeHtml(p.link)}" target="_blank" rel="noopener">${inner}</a>`
                  : `<div class="contrib-card">${inner}</div>`;
            }).join('');
          })
          .catch(() => {
            gridEl.innerHTML = '<p class="empty">Could not load contributors right now, try again later.</p>';
          });
</script>
</body>
</html>
