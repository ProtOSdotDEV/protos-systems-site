<!DOCTYPE html>
<html lang="ua">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Переглянути всіх авторів ProtOS Systems."/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учасники // ProtOS Systems</title>
    <link rel="stylesheet" href="/assets/css/pride.css">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/lang.css">
    <link rel="stylesheet" href="/assets/css/flags.css">
    <link rel="stylesheet" href="/assets/css/nav.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com" rel="preconnect">
</head>
<body>
    <div class="pride-banner">
      <div class="pride-stripes">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span>
      </div>
      <div class="pride-content">
        <span class="pride-comment">/*</span>
        <span class="pride-flag">🏳️‍🌈</span>
        <span class="pride-keyword">З Місяцем Прайду</span>
        <span class="pride-comment">//</span>
        <span class="pride-call"><span class="pride-fn">ProtOS.support(</span><span class="pride-string">"LGBTQIA+"</span><span class="pride-fn">)</span></span>
        <span class="pride-comment"> */</span>
      </div>
    </div>
    <nav class="navbar">
        <div class="navbar-row1">
            <a class="site-title" href="/ua/home/">ProtOS Systems</a>
            <div class="lang-switcher">
                <button class="lang-trigger" id="lang-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                    <span class="lang-trigger-code" id="lang-trigger-code">UA</span>
                    <span class="lang-trigger-chevron"></span>
                </button>
                <div class="lang-menu" id="lang-menu" role="listbox"></div>
            </div>
        </div>
        <div class="nav-links">
            <a class="tab" href="/ua/home/">Огляд</a>
            <a class="tab" href="/ua/projects/">Проєкти</a>
            <a class="tab" href="/ua/dev-logs/">Журнали розробників</a>
            <a class="tab" href="/ua/contact/">Контакти</a>
            <a class="tab active" href="/ua/contributors/">Учасники</a>
        </div>
    </nav>

    <div class="wrap">
      <p class="eyebrow">// Наші чудові автори <3</p>
      <h1>Aвтори</h1>
      <p class="page-lead" style="margin-bottom: 3rem;">
          тут має бути текст
      </p>
        <div class="grid" id="contrib-grid">
            <p class="empty">Завантаження людей :3</p>
        </div>
    </div>

    <footer class="footer">
      <div class="footer-bottom">
        &copy; <span id="year"></span> ProtOS Systems. Усі права захищені.
      </div>
    </footer>

    <script src="/assets/js/lang.js"></script>
    <script>
        const PAGE_LANG = 'ua';
        const PAGE_SLUG = 'contributors';

        Lang.init(PAGE_LANG, PAGE_SLUG);
        Lang.buildDropdown('lang-trigger', 'lang-menu', PAGE_LANG, PAGE_SLUG);

      document.getElementById('year').textContent = new Date().getFullYear();

      const gridEl = document.getElementById('contrib-grid');

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      fetch('/data/contrib.json')
          .then(res => {
              if (!res.ok) throw new Error('Не вдалося завантажити авторів.');
              return res.json();
          })
          .then(data => {
              const contribs = data.contributors || [];
              if (contribs.length === 0) {
                  gridEl.innerHTML = '<p class="empty">Поки що авторів не вказано.</p>';
                  return;
              }
              gridEl.innerHTML = contribs.map(p => {
                  const tags = (p.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
                  const pfp = p.pfp
                      ? `<img class="contrib-pfp" src="${escapeHtml(p.pfp)}" alt="${escapeHtml(p.name)}" loading="lazy">`
                      : `<div class="contrib-pfp contrib-pfp-fallback">${escapeHtml((p.name || '?').slice(0, 1))}</div>`;
                  const inner = `
                        ${pfp}
                        <p>${escapeHtml(p.pronouns || 'Не вказано.')}</p>
                        <span class="pill">${escapeHtml(p.status || 'Заплановано')}</span>
                        <h3 style="margin-top: 0.75rem;">${escapeHtml(p.name)}</h3>
                        <p>${escapeHtml(p.description || '')}</p>
                        <div class="tag-list">${tags}</div>
                    `;
                  const flag = escapeHtml(p.flag || 'rainbow');
                  const card = p.link
                      ? `<a class="contrib-card" href="${escapeHtml(p.link)}" target="_blank" rel="noopener">${inner}</a>`
                      : `<div class="contrib-card">${inner}</div>`;
                  return `<div class="contrib-cell flag-${flag}">${card}</div>`;
              }).join('');
          })
          .catch(() => {
              gridEl.innerHTML = '<p class="empty">Наразі не вдалося завантажити список авторів. Спробуйте ще раз пізніше.</p>';
          });
    </script>
</body>
</html>
