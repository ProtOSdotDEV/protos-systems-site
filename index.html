<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Site is under construction..."/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtOS Systems</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="sytlesheet" href="style.css" />
</head>

<!-- CSS STYLES -->
 <style>
    :root {
    --bg: #0d1117;
    --fg: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --card: #161b22;
    --border: #30363d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

/* Montserrat Font */

body {
    font-family: system-ui, -apple-system, "Montserrat", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 0 1.5rem;
}

a {
    color: #e0e0e0;
    text-decoration: none;
}

a:hover { color: #ffffff; text-decoration: underline; }

.wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 4rem 0 6rem;
}

h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: -0.05em;
    margin-bottom: 0.0rem;
}

.header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
    margin-bottom: 3rem;
}

.site-title {
    font-family: 'JetBrains Mono', 'Fira Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
}

.navbar {
    display: flex;
    gap: 1.5rem;
}

.tagline { color: var(--muted); font-size: 1.1rem; margin-bottom: 2rem; }

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: left;

}

code {
    background: #21262d;
    color: var(--acent);
    padding: 0.1em 0.4em;
    border-radius: 4px;
    font-size: 0.9em;
}

.footer {
    margin-top: 5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #2e2e2e;
    font-size: 0.68rem;
    color: #555555;
    display: flex;
    justify-content: space-between;
}

.footer-bottom {
    background: var(--bg);
    border-top: 1px solid var(--bg);
    padding: 1.25rem 2.5rem;
    text-align: center;
    font-size: 0.75rem;
    color: var(--fg);
}
 </style>
<!---------------->
<body>
    <div class="wrap">
        <header class="header">
            <span class="site-title">ProtOS Systems</span>
            <nav class="navbar">
                <a href="index.html">Home</a>
            </nav>
        </header>
        <section class="card">
            <p>
                bralalalall memow meow meow
            </p>
        </section>

        <footer>
            <div class="footer-bottom">
                &copy; <span id="year"></span> ProtOS Systems. All rights reserved.
            </div>
        </footer>
    
    </div>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
