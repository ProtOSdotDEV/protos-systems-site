<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>404 // ProtOS Systems</title>
    <meta name="description" content="Page not found."/>
    <script src="/assets/js/lang.js"></script>
    <script>
        // const lang = localStorage.getItem('lang') || 'en'; <- for future language integration
        const lang = Lang.getPreferredLang();
        if (!window.location.pathname.includes('/404/')) {
            window.location.replace('/' + lang + '/404/');
        }
    </script>
</head>
<body></body>
</html>
